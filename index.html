<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Algorithms · Practice</title>
  <meta name="description" content="NeetCode-style practice tracker for the Advanced Algorithms (3501) past exams and homeworks." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">∑</span>
        <div>
          <h1>Advanced Algorithms</h1>
          <p class="subtitle">Past exams &amp; homeworks — practice tracker</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="exportBtn" class="reset-btn export-btn" title="Download your progress as a text file">Export progress</button>
        <button id="resetBtn" class="reset-btn" title="Reset all progress">Reset progress</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Progress dashboard -->
    <section class="dashboard">
      <div class="ring-card">
        <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle id="ringProgress" class="ring-fg" cx="60" cy="60" r="52" />
        </svg>
        <div class="ring-label">
          <span id="solvedCount" class="ring-count">0</span>
          <span class="ring-total">/ <span id="totalCount">0</span> solved</span>
        </div>
      </div>

      <div class="diff-stats">
        <div class="diff-stat easy">
          <div class="diff-stat-head"><span>Easy</span><span id="easyFrac">0 / 0</span></div>
          <div class="bar"><div id="easyBar" class="bar-fill"></div></div>
        </div>
        <div class="diff-stat medium">
          <div class="diff-stat-head"><span>Medium</span><span id="medFrac">0 / 0</span></div>
          <div class="bar"><div id="medBar" class="bar-fill"></div></div>
        </div>
        <div class="diff-stat hard">
          <div class="diff-stat-head"><span>Hard</span><span id="hardFrac">0 / 0</span></div>
          <div class="bar"><div id="hardBar" class="bar-fill"></div></div>
        </div>
      </div>

      <div id="unitStats" class="unit-stats"></div>
    </section>

    <!-- Filters -->
    <section class="filters">
      <input id="search" class="search" type="search" placeholder="Search questions, topics, sources…" />
      <div class="filter-row">
        <select id="filterUnit" class="select"><option value="">All units</option></select>
        <select id="filterTopic" class="select"><option value="">All topics</option></select>
        <select id="filterDifficulty" class="select">
          <option value="">All difficulties</option>
          <option value="Easy">Easy</option>
          <option value="Medium">Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <select id="filterType" class="select">
          <option value="">All types</option>
          <option value="T/F">True / False</option>
          <option value="Open">Open questions</option>
        </select>
        <select id="filterSource" class="select">
          <option value="">All sources</option>
          <option value="Exam">Exams</option>
          <option value="Homework">Homeworks</option>
        </select>
        <select id="filterSet" class="select"><option value="">All sets</option></select>
        <select id="filterStatus" class="select">
          <option value="">All statuses</option>
          <option value="done">Solved</option>
          <option value="todo">Unsolved</option>
        </select>
        <button id="clearFilters" class="clear-btn">Clear</button>
      </div>
    </section>

    <p id="resultCount" class="result-count"></p>

    <!-- Questions table -->
    <section class="table-wrap">
      <div class="table-head">
        <button class="col-status th sortable" data-sort="done">Done<span class="sort-ind"></span></button>
        <button class="col-title th sortable" data-sort="code">Question<span class="sort-ind"></span></button>
        <button class="col-topic th sortable" data-sort="topic">Topic<span class="sort-ind"></span></button>
        <button class="col-diff th sortable" data-sort="difficulty">Difficulty<span class="sort-ind"></span></button>
        <button class="col-unit th sortable" data-sort="unit">Unit<span class="sort-ind"></span></button>
      </div>
      <div id="rows" class="rows"></div>
      <p id="emptyState" class="empty-state" hidden>No questions match your filters.</p>
    </section>
  </main>

  <footer class="footer">
    <p>Built for studying · progress is saved locally in your browser.</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

  <!-- Privacy-friendly analytics (GoatCounter) -->
  <script data-goatcounter="https://aa-practice.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
</body>
</html>
